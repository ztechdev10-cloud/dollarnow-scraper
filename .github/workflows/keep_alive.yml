name: Keep Alive — منع إيقاف الجدول

on:
  schedule:
    - cron: '0 */6 * * *'   # كل 6 ساعات — يُشغّل الـ spread تلقائياً
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: تحديث ملف الإبقاء وتشغيل الـ spread
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S UTC')" > .keep_alive
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .keep_alive
          git commit -m "chore: trigger spread $(date '+%Y-%m-%d %H:%M')" || echo "no change"
          git push || echo "push failed"
