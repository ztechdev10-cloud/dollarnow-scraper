name: Keep Alive — منع إيقاف الجدول

on:
  schedule:
    - cron: '0 */2 * * *'   # كل ساعتين
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: تحديث ملف الإبقاء
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S UTC')" > .keep_alive
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .keep_alive
          git commit -m "chore: keep alive $(date '+%Y-%m-%d %H:%M')" || echo "no change"
          git push || echo "push failed"

      - name: تشغيل Spread
        run: gh workflow run spread.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
