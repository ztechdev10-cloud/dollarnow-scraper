name: Keep Alive — منع إيقاف الجدول

on:
  schedule:
    - cron: '0 12 1 * *'   # أول كل شهر الساعة 12 ظهراً
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: تحديث ملف الإبقاء
        run: |
          echo "آخر تحديث: $(date '+%Y-%m-%d %H:%M:%S UTC')" > .keep_alive
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .keep_alive
          git commit -m "chore: keep workflows alive $(date '+%Y-%m')" || echo "لا يوجد تغيير"
          git push || echo "Push فشل — لا بأس"
