name: دولار ناو — تحديث الأسعار

on:
  schedule:
    - cron: '8,38 * * * *'  # كل 30 دقيقة (8 و38 من كل ساعة — بعيداً عن ذروة الطلب)
  workflow_dispatch:         # تشغيل يدوي عند الحاجة

jobs:
  update-rates:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: تثبيت Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: تثبيت المكتبات
        run: pip install httpx beautifulsoup4 firebase-admin python-dotenv

      - name: إنشاء ملف Firebase
        run: echo '${{ secrets.FIREBASE_CREDENTIALS }}' > firebase-credentials.json

      - name: تحديث الأسعار
        run: python github_scraper.py
        env:
          FIREBASE_PROJECT_ID: doolr-ce18b
        continue-on-error: false

      - name: تلخيص النتيجة
        if: always()
        run: echo "انتهى التشغيل — $(date '+%Y-%m-%d %H:%M:%S UTC')"
