name: Syria Telegram Spread

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: spread-run
  cancel-in-progress: false

jobs:
  spread:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install telethon==1.37.0 python-dotenv==1.0.1

      - name: Run spread script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          DOWNLOAD_LINK: ${{ secrets.DOWNLOAD_LINK }}
          PYTHONIOENCODING: utf-8
        run: python railway_spread.py
        timeout-minutes: 340

      - name: Save groups list
        if: always()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add groups.json || true
          git diff --staged --quiet || git commit -m "chore: update groups.json [skip ci]"
          git push || true
