name: Syria Telegram Spread

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: spread-run
  cancel-in-progress: false

jobs:
  spread:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install telethon==1.37.0 python-dotenv==1.0.1

      - name: Run spread script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          DOWNLOAD_LINK: ${{ secrets.DOWNLOAD_LINK }}
          PYTHONIOENCODING: utf-8
        run: python railway_spread.py
        timeout-minutes: 340
